name: Deploy to Linux VM (Nginx)

# Triggers: push to main branch, or manual run from GitHub UI
on:
  push:
    branches:
      - main
  workflow_dispatch:         # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy Static Site

    # Self-hosted runner runs ON the VM itself.
    # The VM connects OUT to GitHub — no inbound ports needed.
    # VM only needs outbound HTTPS (port 443) to github.com.
    runs-on: self-hosted

    steps:
      # ── 1. Checkout latest code directly onto the VM ──────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true           # ensure a clean workspace each run

      # ── 2. Deploy files to Nginx web root ─────────────────
      - name: Deploy to web root
        run: |
          set -e
          SITE_DIR="/var/www/mysite"
          NGINX_CONF="/etc/nginx/sites-available/mysite"

          echo "==> Syncing files to web root..."
          sudo mkdir -p $SITE_DIR
          sudo rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'scripts' \
            $GITHUB_WORKSPACE/ $SITE_DIR/

          echo "==> Fixing file permissions..."
          sudo chown -R www-data:www-data $SITE_DIR
          sudo chmod -R 755 $SITE_DIR

          # ── First-time Nginx config setup ──────────────────
          if [ ! -f "$NGINX_CONF" ]; then
            echo "==> Setting up Nginx config (first run)..."
            sudo cp $GITHUB_WORKSPACE/nginx/mysite.conf $NGINX_CONF
            sudo ln -sf $NGINX_CONF /etc/nginx/sites-enabled/mysite
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
          fi

          echo "==> Reloading Nginx..."
          sudo systemctl reload nginx

          echo "==> Deployment complete!"
