##
## Nginx config for the static "Today Doodle" site
## Place at: /etc/nginx/sites-available/mysite
## Then:  sudo ln -s /etc/nginx/sites-available/mysite /etc/nginx/sites-enabled/
##        sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80;
    listen [::]:80;

    # server_name is set to catch-all (_) because the Application Gateway
    # handles the public domain name. Nginx only receives traffic from the
    # App Gateway via the VM's private IP.
    server_name _;

    root  /var/www/mysite;
    index index.html;

    # ── Main routing ──────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Cache static assets aggressively ─────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|css|js)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                                always;
    add_header X-Frame-Options          "SAMEORIGIN"                             always;
    add_header X-XSS-Protection         "1; mode=block"                          always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Hide Nginx version ────────────────────────────────
    server_tokens off;

    # ── Gzip compression ─────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── Deny access to hidden files (.git, .env, etc.) ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTPS block is auto-added by Certbot when you run:
#   sudo certbot --nginx -d YOUR_DOMAIN
